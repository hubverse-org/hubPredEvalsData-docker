name: Create, Test, and Publish Docker Image

on:
  pull_request:
    branches: [main]
    paths:
      - scripts/create-predevals-data.R
      - scripts/test.R
      - tests/testthat/test-predevals-output.R
      - Dockerfile
      - renv.lock
      - renv/
      - .Rprofile
      - .github/workflows/build-container.yaml
  push:
    branches: [main]
    paths:
      - scripts/create-predevals-data.R
      - scripts/test.R
      - tests/testthat/test-predevals-output.R
      - Dockerfile
      - renv.lock
      - renv/
      - .Rprofile
      - .github/workflows/build-container.yaml
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        required: true
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PUBLISH: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags') || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.publish) }}

jobs:
  build-image:
    permissions: read-all
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}
      test-tag: ${{ steps.name-artifact.outputs.tag }}
    steps:
      - id: checkout
        name: Checkout
        uses: actions/checkout@v4
      - id: setup-buildx
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 #v3.10.0 
      - id: container-login
        if: ${{ env.PUBLISH }}
        name: Log in to the Container registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 #v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        name: Extract metadata (tags, labels) for Docker
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 #v5.7.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=ref,event=pr
            type=ref,event=branch
      - id: name-artifact
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ steps.meta.outputs.tags }}
          LABEL: ${{ steps.meta.outputs.labels }}
        run: |
          echo $TAG
          echo $LABEL
          # This allows us to parse the case when there are multiple tags. 
          tag=$(echo $TAG | sed -e "s+[^:]*[:]\([^ ]*\).*+\1+")
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "name=tag-$tag" >> "$GITHUB_OUTPUT"
        shell: bash {0}
      - id: build
        name: Build and export
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 #v6.16.0
        with:
          context: .
          file: ./Dockerfile
          tags: ${{ steps.meta.outputs.tags }}
          outputs: type=docker,dest=/tmp/hubpredevalsdata-docker.tar
      - id: upload
        name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          retention-days: 1
          name: ${{ steps.name-artifact.outputs.name }}
          path: /tmp/hubpredevalsdata-docker.tar

  test:
    needs: [build-image]
    if: ${{ github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main') }}
    name: "Test predevals output produced by built image"
    runs-on: ubuntu-latest
    permissions: read-all
    steps:
      - id: check-artifacts
        name: Fetch image
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: tag*
      - id: validate
        name: Generate predevals output from test hub and run testthat tests
        env:
          TAG: ${{ needs.build-image.outputs.test-tag }}
        # Strategy: drive the pipeline with the dashboard-test-hub fixture
        # and a live predevals-config from dashboard-test-hub-dashboard, then
        # run the testthat assertions in tests/testthat/. Schema validation
        # of the input config happens inside generate_eval_data(), so a
        # misconfigured config fails the pipeline step before we reach test.R.
        run: |
          path=$(ls artifacts/*/*)
          echo "::group::Setup: clone test hub, fetch predevals-config, load image"
          git clone https://github.com/hubverse-org/dashboard-test-hub.git
          curl -sSL -o predevals-config.yml \
            https://raw.githubusercontent.com/hubverse-org/dashboard-test-hub-dashboard/main/predevals-config.yml
          mkdir -p out
          docker load --input "$path"
          echo "::endgroup::"
          echo "::group::[${TAG}] Generate predevals data against dashboard-test-hub"
          docker run --rm -i -v "$(pwd)":"/project" \
            "ghcr.io/hubverse-org/hubpredevalsdata-docker:${TAG}" \
            create-predevals-data.R \
            -h dashboard-test-hub \
            -d dashboard-test-hub/target-data/oracle-output.csv \
            -c predevals-config.yml \
            -o out
          echo "::endgroup::"
          echo "::group::[${TAG}] Run testthat tests on predevals output"
          docker run --rm -i -v "$(pwd)":"/project" \
            "ghcr.io/hubverse-org/hubpredevalsdata-docker:${TAG}" \
            test.R -o out
          echo "::endgroup::"
        shell: bash
  publish:
    needs: [build-image]
    name: "Publish Image"
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags') || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.publish) }}
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - id: check-artifacts
        name: Fetch Image
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: tag*
      - id: container-login
        name: Log in to the Container registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 #v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: load-image
        run: |
          path=$(ls artifacts/*/*)
          docker load --input "$path"
        shell: bash
      - id: push
        name: Build and Publish
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 #v6.16.0
        with:
          tags: ${{ needs.build-image.outputs.tags }}
          push: ${{ fromJSON(env.PUBLISH) }}
          labels: ${{ needs.build-image.outputs.labels }}
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: ${{ fromJSON(env.PUBLISH) }}


